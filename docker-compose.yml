version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/interview_system.db:/app/interview_system.db
      - ./backend/scheduler_jobs.db:/app/scheduler_jobs.db
      - ./backend/logs:/app/logs
      - ./reports:/reports
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5173', r => r.statusCode===200?process.exit(0):process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
